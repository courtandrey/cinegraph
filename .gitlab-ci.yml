stages:
  - build
  - images
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_BASE: "$CI_REGISTRY_IMAGE"

build:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
    TESTCONTAINERS_HOST_OVERRIDE: "docker"
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository
  script:
    - mvn $MAVEN_CLI_OPTS verify
  artifacts:
    expire_in: 1 day
    paths:
      - exporter/target/*.jar
      - graph-api/target/*.jar

images:
  stage: images
  image: docker:27
  services:
    - docker:27-dind
  needs: ["build"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - export TAG="$CI_COMMIT_SHORT_SHA"
    - |
      for svc in exporter graph-api frontend; do
        docker build -t "$IMAGE_BASE/$svc:$TAG" -t "$IMAGE_BASE/$svc:latest" "./$svc"
        docker push "$IMAGE_BASE/$svc:$TAG"
        docker push "$IMAGE_BASE/$svc:latest"
      done

deploy:
  stage: deploy
  image: alpine:3.20
  needs: ["images"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        cd '$DEPLOY_PATH' &&
        export IMAGE_TAG='$CI_COMMIT_SHORT_SHA' &&
        docker compose -f docker-compose.prod.yml pull &&
        docker compose -f docker-compose.prod.yml up -d &&
        docker image prune -f
      "
