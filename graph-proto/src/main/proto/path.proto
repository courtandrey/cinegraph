syntax = "proto3";

package cinegraph.path;

option java_multiple_files = true;
option java_package = "com.github.courtandrey.cinegraph.proto";
option java_outer_classname = "PathProto";

service PathService {
  rpc ShortestPath (PathRequest) returns (PathReply);
  rpc ShortestPathWithin (SubsetPathRequest) returns (PathReply);
  rpc Reload (ReloadRequest) returns (ReloadReply);
}

message PathRequest {
  int64 from = 1;
  int64 to = 2;
}

message SubsetPathRequest {
  int64 from = 1;
  int64 to = 2;
  repeated int64 allowed = 3;
}

enum PathStatus {
  FOUND = 0;
  NOT_FOUND = 1;
  NOT_CONNECTED = 2;
  UNREACHABLE = 3;
  LOADING = 4;
}

message PathReply {
  PathStatus status = 1;
  int32 hops = 2;
  repeated int64 movie_ids = 3;
}

message ReloadRequest {}

message ReloadReply {
  bool started = 1;
  string state = 2;
}

service RecommendService {
  rpc Recommend (RecommendRequest) returns (RecommendReply);
}

message SeedFilm {
  int64 movie_id = 1;
  double coef = 2;
}

message RecommendRequest {
  repeated SeedFilm seeds = 1;
  repeated int64 exclude = 2;
  int32 limit = 3;
  bool invert = 4;
}

enum RecommendStatus {
  RECOMMEND_OK = 0;
  RECOMMEND_LOADING = 1;
}

message ScoredMovie {
  int64 movie_id = 1;
  double score = 2;
}

message RecommendReply {
  RecommendStatus status = 1;
  repeated ScoredMovie items = 2;
}
