@if (visible()) {
  <div class="consent-banner" role="dialog" aria-label="Analytics consent">
    <span class="consent-text">
      We use Google Analytics to understand how the graph is used. No personal data is sold.
    </span>
    <div class="consent-actions">
      <button class="consent-btn decline" (click)="decline()">Decline</button>
      <button class="consent-btn accept" (click)="accept()">Accept</button>
    </div>
  </div>
}
