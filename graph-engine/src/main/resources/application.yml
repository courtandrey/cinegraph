spring:
  application:
    name: cinegraph-graph-engine
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cinegraph}
    username: ${DB_USER:cinegraph}
    password: ${DB_PASSWORD:cinegraph}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:4}
  flyway:
    enabled: false

server:
  port: ${ENGINE_PORT:8085}

grpc:
  server:
    port: ${ENGINE_GRPC_PORT:9090}

engine:
  max-hops: ${ENGINE_MAX_HOPS:20}
  max-concurrent-queries: ${ENGINE_MAX_CONCURRENT_QUERIES:0}
  queue-timeout-ms: ${ENGINE_QUEUE_TIMEOUT_MS:2000}
  load-on-startup: ${ENGINE_LOAD_ON_STARTUP:true}
  snapshot-path: ${ENGINE_SNAPSHOT_PATH:data/graph-snapshot.bin}

management:
  endpoints:
    web:
      exposure:
        include: health,info
